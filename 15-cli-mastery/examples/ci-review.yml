name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get changed files
        id: changes
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | \
          claude -p \
            --output-format json \
            --max-turns 1 \
            --model sonnet \
            "Review this diff for:
            1. Security vulnerabilities (injection, auth bypass, secrets exposed)
            2. Performance regressions (N+1 queries, missing indexes, blocking ops)
            3. Missing error handling
            4. Missing tests for new logic

            Return JSON matching this schema exactly:
            {
              \"issues\": [{
                \"severity\": \"critical|high|medium|low\",
                \"file\": \"filename\",
                \"line\": 0,
                \"description\": \"what is wrong\",
                \"suggestion\": \"how to fix it\"
              }],
              \"summary\": \"one sentence overall assessment\"
            }" > review.json

      - name: Check for critical issues
        run: |
          CRITICAL=$(jq '[.issues[] | select(.severity=="critical")] | length' review.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ $CRITICAL critical issue(s) found"
            jq -r '.issues[] | select(.severity=="critical") | "  \(.file):\(.line) — \(.description)"' review.json
            exit 1
          fi
          echo "✅ No critical issues"

      - name: Post review comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const review = JSON.parse(fs.readFileSync('review.json', 'utf8'));

            const severityIcon = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };

            const issueLines = review.issues.map(i =>
              `${severityIcon[i.severity] || '⚪'} **${i.severity.toUpperCase()}** \`${i.file}:${i.line}\`\n> ${i.description}\n> 💡 ${i.suggestion}`
            ).join('\n\n');

            const body = [
              '## AI Code Review',
              '',
              `**Summary**: ${review.summary}`,
              '',
              review.issues.length === 0
                ? '✅ No issues found.'
                : `Found ${review.issues.length} issue(s):\n\n${issueLines}`,
              '',
              '_Generated by Claude Code — not a substitute for human review_'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
